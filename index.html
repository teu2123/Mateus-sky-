<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="description" content="SKY Painel — Uso pessoal">
<title>SKY — Painel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">
<!-- HLS.js para player de canais ao vivo -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<!-- Firebase -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js';
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
  from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js';

const firebaseConfig = {
  apiKey:            "AIzaSyCEItt23-DYfbzYODTw2J9MF3l_LdCrWKM",
  authDomain:        "mateus-sky.firebaseapp.com",
  projectId:         "mateus-sky",
  storageBucket:     "mateus-sky.firebasestorage.app",
  messagingSenderId: "241881261873",
  appId:             "1:241881261873:web:7d8a82becaad96e9797210"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);

// Expose to global scope so non-module functions can call them
window._firebaseAuth     = auth;
window._firebaseSignIn   = signInWithEmailAndPassword;
window._firebaseSignOut  = signOut;

// Watch auth state — auto-login/logout when Firebase session changes
onAuthStateChanged(auth, user => {
  if (user) {
    // User is signed in
    window._firebaseUser = user;
    const display = (user.displayName || user.email.split('@')[0]);
    const name = display.charAt(0).toUpperCase() + display.slice(1);
    const $ = id => document.getElementById(id);
    if ($('user-name'))   $('user-name').textContent   = name;
    if ($('user-avatar')) $('user-avatar').textContent = name.charAt(0).toUpperCase();
    // Only navigate to dashboard if we're still on login page
    if (document.getElementById('page-login')?.classList.contains('active')) {
      document.getElementById('page-login').classList.remove('active');
      document.getElementById('page-dashboard').classList.add('active');
      window._postLoginSetup?.();
    }
  } else {
    window._firebaseUser = null;
  }
});
</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#E8002A;--red-bright:#FF1744;--red-dark:#A0001E;
  --black:#060608;--card:#0E0E12;--card2:#13131A;
  --border:rgba(232,0,42,.22);--border-dim:rgba(255,255,255,.07);
  --text:#F0E8E8;--muted:#8A7A7A;
  --nav-h:60px;
  --focus-ring:0 0 0 3px rgba(232,0,42,.5);
}
html,body{height:100%;font-family:'Barlow',sans-serif;background:var(--black);color:var(--text);overflow-x:hidden}
:focus-visible{outline:2px solid var(--red);outline-offset:3px;border-radius:4px}

/* BG */
.bg-fixed{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.bg-noise{position:absolute;inset:0;opacity:.035;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:200px}
.bg-glow{position:absolute;width:500px;height:500px;border-radius:50%;top:-180px;left:50%;transform:translateX(-50%);background:radial-gradient(circle,rgba(232,0,42,.18),transparent 70%);filter:blur(50px)}
.bg-lines{position:absolute;inset:0;opacity:.03;background-image:repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(232,0,42,1) 40px)}

/* PAGES */
.page{display:none;min-height:100vh;position:relative;z-index:1}
.page.active{display:block}
#page-login.active{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;min-height:100vh}

/* ══ LOGIN ══ */
.login-wrapper{width:100%;max-width:400px;animation:fadeUp .7s cubic-bezier(.22,1,.36,1) both}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.header{text-align:center;margin-bottom:28px}
.logo-mark{display:inline-flex;align-items:center;justify-content:center;width:54px;height:54px;border-radius:14px;background:linear-gradient(135deg,var(--red),var(--red-dark));margin-bottom:14px;box-shadow:0 8px 32px rgba(232,0,42,.4);position:relative;overflow:hidden}
.logo-mark::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.15),transparent)}
.logo-mark svg{position:relative;z-index:1}
.logo-text{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;letter-spacing:4px;color:#fff;line-height:1;margin-bottom:4px}
.logo-text span{color:var(--red)}
.header-sub{font-size:.72rem;color:var(--muted);letter-spacing:.12em;text-transform:uppercase}
.card{background:var(--card);border:1px solid var(--border-dim);border-radius:20px;padding:26px 22px;box-shadow:0 24px 64px rgba(0,0,0,.6);position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--red),transparent);pointer-events:none}
.section-label{font-size:.67rem;font-weight:700;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:11px;display:flex;align-items:center;gap:6px}
.section-label::before{content:'';width:3px;height:11px;background:var(--red);border-radius:2px;display:inline-block;flex-shrink:0}

.field{margin-bottom:13px}
.field-label{display:block;font-size:.72rem;font-weight:600;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:7px}
.inp-wrap{position:relative}
.ico-l{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;transition:color .2s;z-index:1;display:flex;align-items:center}
.inp-wrap:focus-within .ico-l{color:var(--red)}
input[type=email],input[type=password],input[type=text],input[type=search]{width:100%;padding:12px 14px 12px 40px;background:rgba(255,255,255,.04);border:1.5px solid var(--border-dim);border-radius:11px;color:var(--text);font-family:'Barlow',sans-serif;font-size:.9rem;outline:none;transition:border-color .22s,background .22s,box-shadow .22s}
input::placeholder{color:rgba(138,122,122,.5)}
input:focus{border-color:var(--red);background:rgba(232,0,42,.06);box-shadow:var(--focus-ring)}
.eye-btn{position:absolute;right:11px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;padding:6px;line-height:0;display:flex;align-items:center;border-radius:6px;transition:color .2s}
.eye-btn:hover{color:var(--red)}
.extras{display:flex;align-items:center;justify-content:space-between;margin:14px 0 18px;gap:8px;flex-wrap:wrap}
.chk-wrap{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
.chk-wrap input{position:absolute;opacity:0;width:0;height:0}
.chk-box{width:17px;height:17px;border-radius:5px;border:1.5px solid var(--border-dim);background:transparent;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.chk-wrap input:checked ~ .chk-box{background:var(--red);border-color:var(--red)}
.chk-mark{font-size:.6rem;color:#fff;opacity:0;transition:opacity .15s;line-height:1}
.chk-wrap input:checked ~ .chk-box .chk-mark{opacity:1}
.chk-txt{font-size:.76rem;color:var(--muted)}
.forgot{font-size:.76rem;color:var(--red);text-decoration:none;font-weight:600;border-radius:4px}
.tfa-note{display:flex;align-items:flex-start;gap:10px;background:rgba(232,0,42,.06);border:1px solid rgba(232,0,42,.18);border-radius:10px;padding:10px 13px;font-size:.73rem;color:var(--muted);margin-bottom:16px;line-height:1.5}
.tfa-note svg{flex-shrink:0;color:var(--red);margin-top:1px}
.alert-wrap .alert{display:flex;align-items:flex-start;gap:9px;background:rgba(232,0,42,.1);border:1px solid rgba(232,0,42,.35);border-radius:10px;padding:10px 14px;font-size:.77rem;color:#ff6b80;margin-bottom:14px;animation:shake .4s ease both}
.alert-wrap[hidden]{display:none}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-5px)}40%,80%{transform:translateX(5px)}}
.btn-login{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--red-bright),var(--red-dark));color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:transform .25s,box-shadow .25s;box-shadow:0 6px 24px rgba(232,0,42,.35);position:relative;overflow:hidden}
.btn-login:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 10px 36px rgba(232,0,42,.5)}
.btn-login:disabled{opacity:.65;cursor:not-allowed}
.spinner{display:none;width:18px;height:18px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.sec-badge{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:16px;font-size:.67rem;color:rgba(255,255,255,.18);letter-spacing:.04em}
.login-stats{display:flex;margin-top:16px;background:rgba(255,255,255,.02);border:1px solid var(--border-dim);border-radius:14px;overflow:hidden}
.lstat{flex:1;text-align:center;padding:12px 8px;border-right:1px solid var(--border-dim)}
.lstat:last-child{border-right:none}
.lstat-n{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:#fff;line-height:1;margin-bottom:2px}
.lstat-n span{color:var(--red)}
.lstat-l{font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}



/* ══ DASHBOARD ══ */
#page-dashboard{padding-bottom:72px}
.topnav{position:sticky;top:0;z-index:100;background:rgba(6,6,8,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border-dim);padding:0 16px;height:var(--nav-h);display:flex;align-items:center;justify-content:space-between}
.nav-logo{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:3px;color:#fff}
.nav-logo span{color:var(--red)}
.nav-right{display:flex;align-items:center;gap:10px}
.user-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--red),var(--red-dark));display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;color:#fff;border:2px solid rgba(232,0,42,.4);flex-shrink:0}
.user-name{font-size:.78rem;font-weight:600;color:var(--text)}
.btn-logout{background:rgba(232,0,42,.12);border:1px solid rgba(232,0,42,.25);border-radius:8px;color:var(--red);font-size:.7rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:6px 12px;cursor:pointer;transition:background .2s;font-family:'Barlow',sans-serif}
.btn-logout:hover{background:rgba(232,0,42,.22)}
.cat-nav{display:flex;overflow-x:auto;padding:0 12px;border-bottom:1px solid var(--border-dim);background:rgba(6,6,8,.7);-webkit-overflow-scrolling:touch;scrollbar-width:none}
.cat-nav::-webkit-scrollbar{display:none}
.cat-btn{flex-shrink:0;display:flex;align-items:center;gap:7px;padding:14px 14px;font-family:'Barlow Condensed',sans-serif;font-size:.83rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:color .2s,border-color .2s;white-space:nowrap;margin-bottom:-1px}
.cat-btn[aria-selected="true"]{color:#fff;border-bottom-color:var(--red)}
.search-bar{padding:14px 16px 8px}
.search-wrap{position:relative}
.search-wrap .s-ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted);display:flex;pointer-events:none}
.search-inp{width:100%;padding:11px 14px 11px 40px;background:rgba(255,255,255,.04);border:1.5px solid var(--border-dim);border-radius:12px;color:var(--text);font-family:'Barlow',sans-serif;font-size:.88rem;outline:none;transition:border-color .22s,box-shadow .22s}
.search-inp:focus{border-color:var(--red);box-shadow:var(--focus-ring)}
.search-inp::placeholder{color:rgba(138,122,122,.4)}
.content-panel{display:none;padding:0 16px}
.content-panel[aria-hidden="false"]{display:block}

/* HERO */
.hero{position:relative;border-radius:18px;overflow:hidden;margin-bottom:22px;height:210px;display:flex;align-items:flex-end;background:var(--card2);border:1px solid var(--border-dim)}
.hero-img{position:absolute;inset:0;background-size:cover;background-position:center top;transition:opacity .5s}
.hero-gradient{position:absolute;inset:0;background:linear-gradient(to top,rgba(6,6,8,1) 0%,rgba(6,6,8,.5) 50%,rgba(6,6,8,.1) 100%)}
.hero-badge{position:absolute;top:14px;left:14px;background:var(--red);color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:.68rem;font-weight:900;letter-spacing:.1em;text-transform:uppercase;padding:4px 10px;border-radius:6px;z-index:1}
.hero-content{position:relative;z-index:1;padding:16px;width:100%}
.hero-title{font-family:'Bebas Neue',sans-serif;font-size:1.75rem;letter-spacing:1px;color:#fff;line-height:1;margin-bottom:4px;text-shadow:0 2px 8px rgba(0,0,0,.8)}
.hero-meta{font-size:.71rem;color:rgba(240,232,232,.7);margin-bottom:12px}
.hero-meta span{color:var(--red);font-weight:600}
.btn-play{display:inline-flex;align-items:center;gap:7px;background:var(--red);color:#fff;border:none;border-radius:9px;padding:9px 18px;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:.84rem;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:background .2s,transform .2s;box-shadow:0 4px 16px rgba(232,0,42,.4)}
.btn-play:hover{background:var(--red-bright);transform:scale(1.03)}

/* SECTIONS */
.section{margin-bottom:26px}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px}
.sec-title{font-family:'Barlow Condensed',sans-serif;font-size:.95rem;font-weight:900;letter-spacing:.08em;text-transform:uppercase;color:#fff;display:flex;align-items:center;gap:7px}
.sec-title::before{content:'';width:3px;height:13px;background:var(--red);border-radius:2px;display:inline-block;flex-shrink:0}
.sec-more{font-size:.72rem;color:var(--red);font-weight:600;cursor:pointer;background:none;border:none;font-family:'Barlow',sans-serif;padding:2px 6px;border-radius:4px}
.grid-scroll{display:flex;gap:11px;overflow-x:auto;padding-bottom:8px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.grid-scroll::-webkit-scrollbar{display:none}

/* ITEM CARD */
.item-card{flex-shrink:0;width:128px;cursor:pointer;transition:transform .2s;border-radius:12px}
.item-card:hover{transform:scale(1.04)}
.item-thumb{width:128px;height:192px;border-radius:12px;background:var(--card2);border:1px solid var(--border-dim);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;margin-bottom:7px}
.item-thumb img{width:100%;height:100%;object-fit:cover;border-radius:12px;display:block}
.item-thumb .emoji-fallback{font-size:2.8rem}
.item-overlay{position:absolute;inset:0;background:rgba(6,6,8,.55);opacity:0;transition:opacity .2s;display:flex;align-items:center;justify-content:center;border-radius:12px}
.item-card:hover .item-overlay{opacity:1}
.play-ico{width:40px;height:40px;border-radius:50%;background:rgba(232,0,42,.9);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,.5)}
.item-badge{position:absolute;top:8px;right:8px;font-size:.58rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:3px 7px;border-radius:5px;pointer-events:none}
.badge-new,.badge-live{background:var(--red);color:#fff}
.badge-live{animation:livepulse 1.5s infinite}
.badge-hd,.badge-4k{background:rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.2);color:var(--text)}
@keyframes livepulse{0%,100%{opacity:1}50%{opacity:.55}}
.item-name{font-size:.77rem;font-weight:600;color:var(--text);line-height:1.2;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-sub{font-size:.66rem;color:var(--muted)}

/* LOADING SKELETON */
.skeleton{background:linear-gradient(90deg,var(--card2) 25%,rgba(255,255,255,.04) 50%,var(--card2) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:12px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* CHANNEL CARD */
.ch-card{flex-shrink:0;width:155px;cursor:pointer;transition:transform .2s;border-radius:12px}
.ch-card:hover{transform:scale(1.03)}
.ch-thumb{width:155px;height:96px;border-radius:12px;background:var(--card2);border:1px solid var(--border-dim);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;margin-bottom:7px;position:relative;overflow:hidden;transition:border-color .2s}
.ch-card:hover .ch-thumb{border-color:rgba(232,0,42,.4)}
.ch-num{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;color:var(--red);letter-spacing:1px;line-height:1}
.ch-emoji{font-size:1.6rem;line-height:1}
.ch-name-big{font-size:.68rem;font-weight:700;color:var(--text);text-align:center;padding:0 6px;line-height:1.2}
.ch-live-dot{position:absolute;top:8px;right:8px;width:7px;height:7px;border-radius:50%;background:var(--red);animation:livepulse 1.5s infinite;box-shadow:0 0 8px rgba(232,0,42,.7)}
.ch-name{font-size:.75rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ch-sub{font-size:.64rem;color:var(--muted)}

/* ══ MODAL PLAYER ══ */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:200;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(10px);animation:fadeIn .22s ease;padding:0}
.modal-overlay[hidden]{display:none}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-box{background:var(--card);border:1px solid var(--border-dim);border-radius:20px 20px 0 0;width:100%;max-width:500px;overflow:hidden;position:relative;animation:slideUp2 .3s cubic-bezier(.22,1,.36,1);max-height:92vh;overflow-y:auto}
@keyframes slideUp2{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--red),transparent);pointer-events:none;z-index:1}

/* VIDEO PLAYER */
.video-wrap{width:100%;background:#000;position:relative;aspect-ratio:16/9}
.video-wrap video{width:100%;height:100%;display:block;background:#000}
.video-placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:var(--card2);z-index:1}
.vid-emoji{font-size:3.5rem}
.vid-status{font-size:.8rem;color:var(--muted);text-align:center;padding:0 20px;line-height:1.6}
.video-controls{display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(0,0,0,.6);position:absolute;bottom:0;left:0;right:0;opacity:0;transition:opacity .3s;z-index:3}
.video-wrap:hover .video-controls{opacity:1}
.vc-btn{background:none;border:none;color:#fff;cursor:pointer;padding:4px;display:flex;border-radius:6px;transition:color .2s}
.vc-btn:hover{color:var(--red)}
.vc-progress{flex:1;height:3px;background:rgba(255,255,255,.2);border-radius:2px;cursor:pointer;position:relative}
.vc-fill{height:100%;background:var(--red);border-radius:2px;width:0%;transition:width .5s linear}
.vc-time{font-size:.68rem;color:rgba(255,255,255,.7);white-space:nowrap}
/* EMBED IFRAME */
.embed-wrap{position:absolute;inset:0;display:none;background:#000;z-index:2}
.embed-wrap iframe{width:100%;height:100%;border:none;display:block}
.embed-loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;gap:10px;background:rgba(6,6,8,.9);font-size:.8rem;color:var(--muted);z-index:1;pointer-events:none}
/* EPISODE SELECTOR */
.ep-selector{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap;padding:10px 12px;background:rgba(255,255,255,.03);border:1px solid var(--border-dim);border-radius:10px}
.ep-sel-lbl{font-size:.7rem;color:var(--muted);font-weight:700;text-transform:upperc
